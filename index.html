<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-widht, initial-sclae=1.0">
    <link rel="stylesheet" href="web.css">
</head>
<body>
    <header class="header">
        <a href="#home" class = "logo"><img src="Leviathan.png" alt="Leviathan Cross"> </a>

        <nav class="navbar">
            <a href="#gallery">Gallery</a>
            <a href="https://links.marz.gay">Socials</a>
        </nav>
    </header>

    <section class="home" id="home">
        <div class="home-content">
            <h3>Marz</h3>
            
            <h1>How many moons contemplating this misfortune</h1>
            
            <p>I'm a Spanish 22 y/o variety streamer on <a href="https://www.twitch.tv/marzhater">Twitch</a>
            This website serves as a place for my socials as well as a small gallery of some of my VRChat pics</p>
        </div>
        <div class="img-box">
            <img src="PlasmaMain.jpg" alt="Plasma in front of a black hole">
        </div>
    </section>

    <section class="gallery" id="gallery">
        <script src="https://cdn.jsdelivr.net/npm/tabletop@1.5.4/tabletop.min.js"></script>
        <script>
          window.addEventListener('DOMContentLoaded', () => {
            Tabletop.init({
              key: '16Wjzh9weTXK8Mx3vfKPWR1KurXinO2s_SKRSjLZASHU',
              simpleSheet: true,
              callback: function(data) {
                const gallery = document.getElementById('gallery');
                data.forEach(item => {
                  const div = document.createElement('div');
                  div.className = 'gallery-item';
                  div.innerHTML = `
                    <img src="${item.image_url}" alt="${item.title}" style="max-width: 100%; height: auto;">
                    <h3>${item.title}</h3>
                    <p>${item.description1}</p><p>${item.description2}</p><p>${item.description3}</p>
                  `;
                  gallery.appendChild(div);
                });
              }
            });
          });
        </script>
    </section>
</body>
</html>
